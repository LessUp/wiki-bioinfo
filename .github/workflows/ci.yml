name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Check code formatting
        run: |
          # Check for trailing whitespace
          if grep -rn '[[:space:]]$' src/content/docs --include='*.md' --include='*.mdx' | grep -q .; then
            echo "❌ Found trailing whitespace in files:"
            grep -rn '[[:space:]]$' src/content/docs --include='*.md' --include='*.mdx' | head -20
            exit 1
          fi
          echo "✅ No trailing whitespace found"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run Markdown Lint
        run: markdownlint 'src/content/docs/**/*.md' 'src/content/docs/**/*.mdx' --ignore 'src/content/docs/**/node_modules/**' || true

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check internal links
        run: bash scripts/checks/check-links.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, link-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
