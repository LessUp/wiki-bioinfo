name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      deploy_fonts:
        description: 'Deploy with local fonts (23MB)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  USE_LOCAL_FONTS: ${{ github.event.inputs.deploy_fonts }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Cache Astro build for faster rebuilds
      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-build-${{ hashFiles('src/content/docs/**/*.mdx') }}-${{ hashFiles('src/content/docs/**/*.md') }}
          restore-keys: |
            astro-build-

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production
          # Skip font optimization in build for speed
          SKIP_FONT_OPTIMIZATION: 1

      # Optional: Remove fonts from deployment to save bandwidth
      # Fonts will 404 but CSS font-display:swap handles gracefully
      - name: Optimize deployment (remove large fonts)
        if: ${{ !github.event.inputs.deploy_fonts }}
        run: |
          echo "Removing local fonts from deployment (saving ~23MB)..."
          rm -rf dist/fonts/*.otf dist/fonts/*.ttf
          echo "Fonts removed. Using system fonts as fallback."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
