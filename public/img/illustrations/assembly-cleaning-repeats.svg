<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">组装图常见异常结构与清理策略</text>

  <!-- 1. Tips (末端分支) -->
  <g transform="translate(50, 80)">
    <text x="0" y="0" font-family="Arial" font-size="16" font-weight="bold" fill="#333">1. Tips (末端分支 - 测序错误造成)</text>
    <g transform="translate(20, 40)">
      <circle cx="0" cy="0" r="10" fill="#4A90E2" />
      <circle cx="100" cy="0" r="10" fill="#4A90E2" />
      <circle cx="200" cy="0" r="10" fill="#4A90E2" />
      <line x1="10" y1="0" x2="90" y2="0" stroke="#333" stroke-width="2" />
      <line x1="110" y1="0" x2="190" y2="0" stroke="#333" stroke-width="2" />
      
      <!-- Tip branch -->
      <line x1="100" y1="10" x2="130" y2="50" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrow-red)" />
      <circle cx="140" cy="65" r="10" fill="#E74C3C" />
      <text x="160" y="70" font-family="Arial" font-size="12" fill="#E74C3C">Tip: 低覆盖度, 很快终止</text>
      
      <!-- Cleaning Action -->
      <path d="M 250 20 L 290 20" stroke="#2ECC71" stroke-width="3" marker-end="url(#arrow-green)" />
      <text x="300" y="25" font-family="Arial" font-size="14" fill="#2ECC71" font-weight="bold">剪除 (Pruning)</text>
    </g>
  </g>

  <!-- 2. Bubbles (气泡 - SNP或测序微差) -->
  <g transform="translate(50, 220)">
    <text x="0" y="0" font-family="Arial" font-size="16" font-weight="bold" fill="#333">2. Bubbles (气泡 - 变异或局部错误)</text>
    <g transform="translate(20, 40)">
      <circle cx="0" cy="0" r="10" fill="#4A90E2" />
      <circle cx="200" cy="0" r="10" fill="#4A90E2" />
      
      <!-- Paths -->
      <path d="M 10 -5 Q 100 -50 190 -5" fill="none" stroke="#333" stroke-width="2" />
      <text x="100" y="-35" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">主路径 (高覆盖)</text>
      
      <path d="M 10 5 Q 100 50 190 5" fill="none" stroke="#F1C40F" stroke-width="2" />
      <text x="100" y="45" font-family="Arial" font-size="12" fill="#F39C12" text-anchor="middle">次路径 (低覆盖/变异)</text>
      
      <!-- Cleaning Action -->
      <path d="M 250 0 L 290 0" stroke="#2ECC71" stroke-width="3" marker-end="url(#arrow-green)" />
      <text x="300" y="5" font-family="Arial" font-size="14" fill="#2ECC71" font-weight="bold">合并 (Merging)</text>
    </g>
  </g>

  <!-- 3. Repeats (重复序列 - 造成图坍缩) -->
  <g transform="translate(50, 360)">
    <text x="0" y="0" font-family="Arial" font-size="16" font-weight="bold" fill="#333">3. Repeats (重复序列 - 造成歧义分叉)</text>
    <g transform="translate(20, 40)">
      <circle cx="0" cy="0" r="10" fill="#3498DB" />
      <circle cx="100" cy="0" r="10" fill="#9B59B6" />
      <circle cx="200" cy="-30" r="10" fill="#3498DB" />
      <circle cx="200" cy="30" r="10" fill="#3498DB" />
      
      <line x1="10" y1="0" x2="90" y2="0" stroke="#333" stroke-width="2" />
      <line x1="110" y1="-5" x2="190" y2="-25" stroke="#333" stroke-width="2" />
      <line x1="110" y1="5" x2="190" y2="25" stroke="#333" stroke-width="2" />
      
      <text x="100" y="-20" font-family="Arial" font-size="12" fill="#9B59B6" text-anchor="middle">重复单元 (Collapse)</text>
      <text x="0" y="25" font-family="Arial" font-size="10" fill="#666">前导序列</text>
      <text x="220" y="-30" font-family="Arial" font-size="10" fill="#666">后续序列 A</text>
      <text x="220" y="35" font-family="Arial" font-size="10" fill="#666">后续序列 B</text>
      
      <!-- Resolution Action -->
      <path d="M 320 0 L 360 0" stroke="#E67E22" stroke-width="3" marker-end="url(#arrow-orange)" />
      <text x="370" y="5" font-family="Arial" font-size="14" fill="#E67E22" font-weight="bold">解析 (Unrolling via Long Reads)</text>
    </g>
  </g>

  <!-- Defs -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ECC71" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22" />
    </marker>
  </defs>
</svg>
