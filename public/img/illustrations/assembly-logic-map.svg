<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">基因组组装知识逻辑地图</text>

  <!-- Input -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="120" height="60" fill="#E8F4FD" stroke="#4A90E2" stroke-width="2" rx="5" />
    <text x="60" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">测序 Reads</text>
  </g>

  <!-- Theory Path -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="150" height="60" fill="#f9f9f9" stroke="#999" stroke-width="2" rx="5" stroke-dasharray="5,5" />
    <text x="75" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">理论基础</text>
    <text x="75" y="45" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">最短超串 / SBH</text>
  </g>

  <!-- Algorithms Path -->
  <g transform="translate(50, 200)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#333">核心算法范式</text>
    
    <!-- OLC -->
    <rect x="0" y="0" width="150" height="80" fill="#FFF4F4" stroke="#E74C3C" stroke-width="2" rx="5" />
    <text x="75" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#E74C3C" text-anchor="middle">OLC 范式</text>
    <text x="75" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">适合长读长 (PacBio/ONT)</text>
    <text x="75" y="70" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">哈密顿路径近似</text>

    <!-- DBG -->
    <rect x="250" y="0" width="150" height="80" fill="#F4FFF4" stroke="#2ECC71" stroke-width="2" rx="5" />
    <text x="325" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#2ECC71" text-anchor="middle">de Bruijn 图</text>
    <text x="325" y="55" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">适合短读长 (Illumina)</text>
    <text x="325" y="70" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">欧拉路径转化</text>
  </g>

  <!-- Graph Operations -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#FFF9E6" stroke="#F1C40F" stroke-width="2" rx="5" />
    <text x="200" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#F39C12" text-anchor="middle">图处理与优化 (Graph Traversal &amp; Cleaning)</text>
    <text x="200" y="55" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">DFS/BFS 遍历 · Tips 剪除 · Bubble 合并</text>
    <text x="200" y="80" font-family="Arial" font-size="12" fill="#E67E22" font-weight="bold" text-anchor="middle">解决重复序列与测序错误</text>
  </g>

  <!-- Evaluation -->
  <g transform="translate(550, 200)">
    <rect x="0" y="0" width="180" height="120" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="5" />
    <text x="90" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">组装评估 (Evaluation)</text>
    <text x="90" y="60" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">连续性 (N50/L50)</text>
    <text x="90" y="80" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">完整性 (BUSCO)</text>
    <text x="90" y="100" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">正确性 (Mapping)</text>
  </g>

  <!-- Connectors -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <path d="M 170 110 L 240 110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 110 145 L 110 190" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 325 145 L 325 190" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <path d="M 110 285 L 110 340" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 325 285 L 325 340" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <path d="M 460 300 L 540 270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="500" y="275" font-family="Arial" font-size="12" fill="#333" text-anchor="middle" transform="rotate(-20, 500, 275)">输出</text>

</svg>
