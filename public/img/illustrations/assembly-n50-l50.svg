<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">N50 与 L50 指标示意图</text>

  <!-- Genome Assembly Bar -->
  <g transform="translate(50, 80)">
    <text x="0" y="-10" font-family="Arial" font-size="14" fill="#666">将 Contigs 按长度从大到小排列:</text>
    
    <!-- Contigs -->
    <rect x="0" y="0" width="150" height="40" fill="#4A90E2" stroke="#fff" stroke-width="2" />
    <text x="75" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">C1 (150kb)</text>
    
    <rect x="150" y="0" width="120" height="40" fill="#4A90E2" stroke="#fff" stroke-width="2" />
    <text x="210" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">C2 (120kb)</text>
    
    <rect x="270" y="0" width="100" height="40" fill="#4A90E2" stroke="#fff" stroke-width="2" />
    <text x="320" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">C3 (100kb)</text>
    
    <rect x="370" y="0" width="80" height="40" fill="#4A90E2" stroke="#fff" stroke-width="2" />
    <text x="410" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">C4 (80kb)</text>
    
    <rect x="450" y="0" width="60" height="40" fill="#BDC3C7" stroke="#fff" stroke-width="2" />
    <rect x="510" y="0" width="50" height="40" fill="#BDC3C7" stroke="#fff" stroke-width="2" />
    <rect x="560" y="0" width="40" height="40" fill="#BDC3C7" stroke="#fff" stroke-width="2" />
    <text x="620" y="25" font-family="Arial" font-size="12" fill="#999">...</text>
    
    <!-- Total Length Indicator -->
    <line x1="0" y1="60" x2="700" y2="60" stroke="#333" stroke-width="1" marker-start="url(#dot)" marker-end="url(#dot)" />
    <text x="350" y="75" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">总长度 (Total Length = 700kb)</text>
  </g>

  <!-- 50% Mark -->
  <g transform="translate(50, 180)">
    <line x1="350" y1="-20" x2="350" y2="60" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5" />
    <text x="355" y="10" font-family="Arial" font-size="14" font-weight="bold" fill="#E74C3C">50% 总长度 (350kb)</text>
    
    <!-- N50 Explanation -->
    <g transform="translate(370, 40)">
      <path d="M 0 0 L -20 0" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
      <text x="10" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#2ECC71">N50 = 100kb</text>
      <text x="10" y="25" font-family="Arial" font-size="12" fill="#666">(跨过 50% 阈值的那个 contig 的长度)</text>
    </g>

    <!-- L50 Explanation -->
    <g transform="translate(0, 100)">
      <text x="0" y="0" font-family="Arial" font-size="16" font-weight="bold" fill="#F1C40F">L50 = 3</text>
      <text x="0" y="20" font-family="Arial" font-size="12" fill="#666">(达到 50% 总长度所需的 contig 数量：C1, C2, C3)</text>
    </g>
  </g>

  <!-- Defs -->
  <defs>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#333" />
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
