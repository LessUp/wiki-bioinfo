<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Left: k-mer Decomposition -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">1. k-mer 分解 (k=3)</text>
    <rect x="0" y="20" width="120" height="30" fill="#E8F4FD" stroke="#4A90E2" rx="4" />
    <text x="10" y="40" font-family="Courier" font-size="16" font-weight="bold" fill="#333">A G A T C</text>
    
    <!-- Arrows for sliding window -->
    <path d="M 10 60 L 50 60" stroke="#F5A623" stroke-width="2" marker-end="url(#arrow-orange)" />
    <text x="10" y="80" font-family="Courier" font-size="14" fill="#F5A623">AGA</text>
    
    <path d="M 40 100 L 80 100" stroke="#F5A623" stroke-width="2" marker-end="url(#arrow-orange)" />
    <text x="40" y="120" font-family="Courier" font-size="14" fill="#F5A623">GAT</text>
    
    <path d="M 70 140 L 110 140" stroke="#F5A623" stroke-width="2" marker-end="url(#arrow-orange)" />
    <text x="70" y="160" font-family="Courier" font-size="14" fill="#F5A623">ATC</text>
  </g>

  <!-- Right: Graph Structure -->
  <g transform="translate(450, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">2. 图构建 (Vertices &amp; Edges)</text>
    
    <!-- Nodes (k-1)-mers -->
    <circle cx="50" cy="80" r="25" fill="#4A90E2" />
    <text x="38" y="85" font-family="Courier" font-size="14" font-weight="bold" fill="white">AG</text>
    
    <circle cx="150" cy="80" r="25" fill="#4A90E2" />
    <text x="138" y="85" font-family="Courier" font-size="14" font-weight="bold" fill="white">GA</text>
    
    <circle cx="250" cy="80" r="25" fill="#4A90E2" />
    <text x="238" y="85" font-family="Courier" font-size="14" font-weight="bold" fill="white">AT</text>

    <!-- Edges k-mers -->
    <path d="M 75 80 L 125 80" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="85" y="70" font-family="Courier" font-size="12" fill="#333">AGA</text>
    
    <path d="M 175 80 L 225 80" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="185" y="70" font-family="Courier" font-size="12" fill="#333">GAT</text>
  </g>

  <!-- Bottom: Error Structures -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">3. 图中干扰结构</text>
    
    <!-- Tip -->
    <g transform="translate(20, 40)">
      <circle cx="0" cy="0" r="8" fill="#4A90E2" />
      <circle cx="50" cy="0" r="8" fill="#4A90E2" />
      <line x1="8" y1="0" x2="42" y2="0" stroke="#333" />
      <!-- Tip branch -->
      <line x1="50" y1="8" x2="70" y2="30" stroke="#E74C3C" stroke-width="2" />
      <circle cx="75" cy="35" r="8" fill="#E74C3C" />
      <text x="85" y="40" font-family="Arial" font-size="12" fill="#E74C3C">Tip (测序错误)</text>
    </g>
    
    <!-- Bubble -->
    <g transform="translate(250, 40)">
      <circle cx="0" cy="0" r="8" fill="#4A90E2" />
      <circle cx="100" cy="0" r="8" fill="#4A90E2" />
      <!-- Top path -->
      <path d="M 8 -5 Q 50 -30 92 -5" fill="none" stroke="#333" stroke-width="2" />
      <!-- Bottom path -->
      <path d="M 8 5 Q 50 30 92 5" fill="none" stroke="#F1C40F" stroke-width="2" />
      <text x="35" y="45" font-family="Arial" font-size="12" fill="#F1C40F">Bubble (SNP/错误)</text>
    </g>
  </g>

  <!-- Defs -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F5A623" />
    </marker>
  </defs>
</svg>
