  <text x="64" y="106" fill="#64748b" font-size="18" font-family="Arial">顶点表示 (k-1)-mer，边表示 k-mer，路径对应序列重建。</text>
  <g stroke="#4f46e5" stroke-width="8" stroke-linecap="round">
    <path d="M150 220H256"/>
    <path d="M318 220H424"/>
    <path d="M486 220H592"/>
