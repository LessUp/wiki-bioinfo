    <path d="M424 150C470 124 538 142 560 220"/>
    <path d="M256 220C278 300 342 318 390 290"/>
    <path d="M424 290C470 316 538 298 560 220"/>
  </g>
  <g fill="white" stroke="#4f46e5" stroke-width="6">
    <circle cx="120" cy="220" r="34"/>
    <circle cx="288" cy="220" r="34"/>
    <circle cx="456" cy="220" r="34"/>
    <circle cx="624" cy="220" r="34"/>
    <circle cx="396" cy="146" r="34" fill="#e0e7ff"/>
    <circle cx="396" cy="294" r="34" fill="#e0e7ff"/>
  </g>
  <g fill="#1e1b4b" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">
    <text x="120" y="227">AAG</text>
    <text x="288" y="227">AGA</text>
    <text x="456" y="227">GAT</text>
    <text x="624" y="227">ATT</text>
    <text x="396" y="153">TCT</text>
