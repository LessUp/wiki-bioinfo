    <text x="342" y="208">AGAT</text>
    <text x="510" y="208">GATT</text>
    <text x="288" y="144">TTCT</text>
    <text x="450" y="140">TCTA</text>
    <text x="288" y="330">TCTC</text>
    <text x="448" y="334">CTCT</text>
