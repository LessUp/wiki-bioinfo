<svg width="580" height="460" viewBox="0 0 580 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="580" height="460" rx="24" fill="#f5f3ff"/>
  <text x="290" y="42" fill="#3730a3" font-size="22" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">编辑距离 DP 矩阵</text>
  <text x="290" y="68" fill="#64748b" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">GATT → GCAT · 行 = 源串前缀，列 = 目标串前缀</text>

  <!--
    网格布局: 6 列 × 6 行
    列宽 col=76, 行高 row=48
    左上角 (ox, oy) = (52, 90)
    col 0: 标题列 (行标题), col 1-5: ε G C A T
    row 0: 标题行 (列标题), row 1-5: ε G A T T
    单元格中心 cx = ox + col*76 + 38, cy = oy + row*48 + 30
  -->
  <g transform="translate(52 90)">
    <!-- 表格背景（不含标题行/列的白色区域） -->
    <rect x="76" y="48" width="380" height="240" rx="10" fill="white" stroke="#ddd6fe" stroke-width="2.5"/>

    <!-- 内部网格线 -->
    <line x1="152" y1="48" x2="152" y2="288" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="228" y1="48" x2="228" y2="288" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="304" y1="48" x2="304" y2="288" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="380" y1="48" x2="380" y2="288" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="76" y1="96" x2="456" y2="96" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="76" y1="144" x2="456" y2="144" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="76" y1="192" x2="456" y2="192" stroke="#ede9fe" stroke-width="1.2"/>
    <line x1="76" y1="240" x2="456" y2="240" stroke="#ede9fe" stroke-width="1.2"/>

    <!-- 最优路径高亮: (0,0)→diag(1,1)→sub(2,2)→sub(3,3)→diag(4,4) -->
    <!-- 匹配单元格（对角线代价0）: (1,1) G=G, (4,4) T=T -->
    <rect x="77"  y="49"  width="74" height="46" fill="#e0e7ff" rx="4" opacity="0.7"/>
    <rect x="381" y="193" width="74" height="46" fill="#e0e7ff" rx="4" opacity="0.7"/>
    <!-- 替换单元格（对角线代价1）: (2,2) A≠C, (3,3) T≠A -->
    <rect x="153" y="97"  width="74" height="46" fill="#fef3c7" rx="4" opacity="0.5"/>
    <rect x="229" y="145" width="74" height="46" fill="#fef3c7" rx="4" opacity="0.5"/>

    <!-- 路径箭头 -->
    <g stroke="#4f46e5" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
      <!-- (0,0) → (1,1) 对角线匹配 -->
      <line x1="118" y1="78" x2="182" y2="108"/>
      <!-- (1,1) → (2,2) 对角线替换 -->
      <line x1="196" y1="126" x2="258" y2="156"/>
      <!-- (2,2) → (3,3) 对角线替换 -->
      <line x1="272" y1="174" x2="334" y2="204"/>
      <!-- (3,3) → (4,4) 对角线匹配 -->
      <line x1="348" y1="222" x2="410" y2="252"/>
    </g>

    <!-- 列标题 (row 0): 空, ε, G, C, A, T -->
    <text x="114" y="34" fill="#64748b" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">ε</text>
    <text x="190" y="34" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">G</text>
    <text x="266" y="34" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">C</text>
    <text x="342" y="34" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">A</text>
    <text x="418" y="34" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">T</text>

    <!-- 行标题 (col 0): ε, G, A, T, T -->
    <text x="38" y="78"  fill="#64748b" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">ε</text>
    <text x="38" y="126" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">G</text>
    <text x="38" y="174" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">A</text>
    <text x="38" y="222" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">T</text>
    <text x="38" y="270" fill="#3730a3" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">T</text>

    <!-- DP 数值  5×5 矩阵 -->
    <g fill="#1e1b4b" font-size="16" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
      <!-- row ε (i=0) -->
      <text x="114" y="78">0</text>
      <text x="190" y="78">1</text>
      <text x="266" y="78">2</text>
      <text x="342" y="78">3</text>
      <text x="418" y="78">4</text>
      <!-- row G (i=1) -->
      <text x="114" y="126">1</text>
      <text x="190" y="126">0</text>
      <text x="266" y="126">1</text>
      <text x="342" y="126">2</text>
      <text x="418" y="126">3</text>
      <!-- row A (i=2) -->
      <text x="114" y="174">2</text>
      <text x="190" y="174">1</text>
      <text x="266" y="174">1</text>
      <text x="342" y="174">1</text>
      <text x="418" y="174">2</text>
      <!-- row T (i=3) -->
      <text x="114" y="222">3</text>
      <text x="190" y="222">2</text>
      <text x="266" y="222">2</text>
      <text x="342" y="222">2</text>
      <text x="418" y="222">1</text>
      <!-- row T (i=4) -->
      <text x="114" y="270">4</text>
      <text x="190" y="270">3</text>
      <text x="266" y="270">3</text>
      <text x="342" y="270">3</text>
      <text x="418" y="270">2</text>
    </g>
  </g>

  <!-- 图例 -->
  <g transform="translate(52 410)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="20" y="12" fill="#64748b" font-size="12" font-family="Arial, sans-serif">匹配（代价 0）</text>
    <rect x="130" y="0" width="14" height="14" rx="3" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <text x="150" y="12" fill="#64748b" font-size="12" font-family="Arial, sans-serif">替换（代价 1）</text>
    <line x1="260" y1="7" x2="286" y2="7" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="294" y="12" fill="#64748b" font-size="12" font-family="Arial, sans-serif">最优路径</text>
    <text x="380" y="12" fill="#94a3b8" font-size="12" font-family="Arial, sans-serif">dp[4][4] = 2</text>
  </g>
</svg>
