<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 20px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style>
  <text x="60" y="60" class="title">Gene structure</text>
  <line x1="120" y1="350" x2="1080" y2="350" stroke="#5f7c99" stroke-width="6"/>
  <rect x="180" y="310" width="110" height="80" fill="#8ec5ff" rx="10"/>
  <rect x="410" y="310" width="140" height="80" fill="#8ec5ff" rx="10"/>
  <rect x="720" y="310" width="160" height="80" fill="#8ec5ff" rx="10"/>
  <line x1="290" y1="350" x2="410" y2="350" stroke="#c4d4e4" stroke-width="10"/>
  <line x1="550" y1="350" x2="720" y2="350" stroke="#c4d4e4" stroke-width="10"/>
  <rect x="180" y="290" width="30" height="120" fill="#ffcf7d" rx="8"/>
  <rect x="850" y="290" width="30" height="120" fill="#ffcf7d" rx="8"/>
  <text x="188" y="265" class="lab">5' UTR</text>
  <text x="840" y="265" class="lab">3' UTR</text>
  <text x="206" y="440" class="lab">Exon 1</text>
  <text x="450" y="440" class="lab">Exon 2</text>
  <text x="756" y="440" class="lab">Exon 3</text>
  <text x="326" y="440" class="lab">Intron</text>
  <text x="602" y="440" class="lab">Intron</text>
  <path d="M200 500 H940" stroke="#e07a7a" stroke-width="6" stroke-dasharray="12 10"/>
  <text x="470" y="535" class="lab">转录本覆盖区域</text>
  <text x="60" y="650" class="small">基因组上的 gene 常由外显子、内含子和 UTR 组成；RNA-seq 定量、变异注释和转录本分析都依赖这一层结构信息。</text>
</svg>