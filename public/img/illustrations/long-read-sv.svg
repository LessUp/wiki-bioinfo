<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}.lab{font:600 21px sans-serif;fill:#183153}</style>
  <text x="60" y="60" class="title">Long-read structural variant evidence</text>
  <line x1="100" y1="240" x2="1100" y2="240" stroke="#406080" stroke-width="7"/>
  <rect x="420" y="225" width="180" height="30" fill="#ffb3b3"/>
  <text x="455" y="210" class="lab">参考中的缺失区间</text>
  <path d="M130 180 H400 M620 180 H1020" fill="none" stroke="#6aa7ff" stroke-width="10" stroke-linecap="round"/>
  <path d="M130 180 Q510 120 1020 180" fill="none" stroke="#2f7ed8" stroke-width="8" stroke-linecap="round"/>
  <text x="180" y="130" class="lab">split-read 跨越断点</text>
  <path d="M180 360 H1040" stroke="#8fd3a8" stroke-width="12" stroke-linecap="round"/>
  <path d="M180 360 H420 M600 360 H1040" stroke="#4cab67" stroke-width="12" stroke-linecap="round"/>
  <text x="260" y="325" class="lab">覆盖度下降支持缺失</text>
  <path d="M180 530 H480" stroke="#c9d5e5" stroke-width="12" stroke-linecap="round"/>
  <path d="M480 530 C560 470, 670 470, 760 530" fill="none" stroke="#c47dff" stroke-width="12" stroke-linecap="round"/>
  <path d="M760 530 H1020" stroke="#c9d5e5" stroke-width="12" stroke-linecap="round"/>
  <text x="470" y="450" class="lab">插入序列在 read 中额外出现</text>
  <text x="70" y="655" class="small">长读长通过跨断点比对模式、覆盖变化和长片段上下文，为大型插入、缺失、倒位和复杂重排提供更直接的证据。</text>
</svg>