<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Stage 1: Overlap -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">1. Overlap (重叠检测)</text>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#4A90E2" stroke-width="4" stroke-linecap="round" />
    <line x1="100" y1="60" x2="200" y2="60" stroke="#4A90E2" stroke-width="4" stroke-linecap="round" />
    <line x1="180" y1="80" x2="280" y2="80" stroke="#4A90E2" stroke-width="4" stroke-linecap="round" />
    
    <!-- Overlap indicators -->
    <rect x="100" y="35" width="20" height="30" fill="#F5A623" fill-opacity="0.3" stroke="#F5A623" stroke-dasharray="2,2" />
    <rect x="180" y="55" width="20" height="30" fill="#F5A623" fill-opacity="0.3" stroke="#F5A623" stroke-dasharray="2,2" />
    
    <text x="20" y="110" font-family="Arial" font-size="12" fill="#666">寻找 reads 之间的末端重叠</text>
  </g>

  <!-- Stage 2: Layout -->
  <g transform="translate(450, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">2. Layout (布局图构建)</text>
    <!-- Graph representation -->
    <circle cx="50" cy="60" r="15" fill="#4A90E2" />
    <text x="45" y="65" font-family="Arial" font-size="12" fill="white">R1</text>
    
    <circle cx="150" cy="60" r="15" fill="#4A90E2" />
    <text x="145" y="65" font-family="Arial" font-size="12" fill="white">R2</text>
    
    <circle cx="250" cy="60" r="15" fill="#4A90E2" />
    <text x="245" y="65" font-family="Arial" font-size="12" fill="white">R3</text>
    
    <path d="M 65 60 L 135 60" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M 165 60 L 235 60" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <text x="0" y="110" font-family="Arial" font-size="12" fill="#666">构建重叠图并寻找最佳路径</text>
  </g>

  <!-- Stage 3: Consensus -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">3. Consensus (一致性序列生成)</text>
    
    <!-- Multiple alignment -->
    <text x="20" y="40" font-family="Courier" font-size="14" fill="#666">R1: ACGTAC----</text>
    <text x="20" y="60" font-family="Courier" font-size="14" fill="#666">R2: --GTACGA--</text>
    <text x="20" y="80" font-family="Courier" font-size="14" fill="#666">R3: ----ACGA-T</text>
    
    <line x1="20" y1="95" x2="300" y2="95" stroke="#333" stroke-width="1" />
    
    <text x="20" y="120" font-family="Courier" font-size="14" font-weight="bold" fill="#2ECC71">Con: ACGTACGATT</text>
    
    <text x="20" y="145" font-family="Arial" font-size="12" fill="#666">多重比对纠错，输出最终序列</text>
  </g>

  <!-- Connection Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
