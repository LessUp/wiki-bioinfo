<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}.box{fill:white;stroke:#b8d7f0;stroke-width:2;rx:16}</style>
  <text x="60" y="60" class="title">Peptide-spectrum match</text>
  <rect x="90" y="140" width="430" height="420" class="box"/>
  <text x="210" y="180" class="lab">实验 MS2 谱图</text>
  <line x1="140" y1="500" x2="470" y2="500" stroke="#4a6988" stroke-width="3"/>
  <line x1="180" y1="500" x2="180" y2="380" stroke="#78aef5" stroke-width="7"/>
  <line x1="235" y1="500" x2="235" y2="445" stroke="#ff9f7b" stroke-width="7"/>
  <line x1="300" y1="500" x2="300" y2="325" stroke="#92d19b" stroke-width="7"/>
  <line x1="360" y1="500" x2="360" y2="415" stroke="#c7a6ff" stroke-width="7"/>
  <line x1="425" y1="500" x2="425" y2="350" stroke="#ffd06a" stroke-width="7"/>
  <rect x="680" y="140" width="430" height="420" class="box"/>
  <text x="790" y="180" class="lab">理论碎裂谱</text>
  <line x1="730" y1="500" x2="1060" y2="500" stroke="#4a6988" stroke-width="3"/>
  <line x1="770" y1="500" x2="770" y2="390" stroke="#78aef5" stroke-width="7"/>
  <line x1="825" y1="500" x2="825" y2="440" stroke="#ff9f7b" stroke-width="7"/>
  <line x1="890" y1="500" x2="890" y2="335" stroke="#92d19b" stroke-width="7"/>
  <line x1="950" y1="500" x2="950" y2="420" stroke="#c7a6ff" stroke-width="7"/>
  <line x1="1015" y1="500" x2="1015" y2="360" stroke="#ffd06a" stroke-width="7"/>
  <path d="M530 350 H660" stroke="#4f8cc9" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f8cc9"/></marker></defs>
  <text x="535" y="320" class="lab">匹配打分</text>
  <text x="480" y="615" class="small">数据库搜索会把实验谱图和候选肽段的理论碎裂谱进行比较，PSM 是最基本的鉴定证据单位。</text>
</svg>