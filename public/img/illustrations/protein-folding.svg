<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" fill="#fbfcff"/><style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 20px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style><text x="60" y="60" class="title">Protein structure levels</text><path d="M120 180 C180 120, 260 240, 320 180 C380 120, 460 240, 520 180" fill="none" stroke="#6ea8ff" stroke-width="12" stroke-linecap="round"/><text x="190" y="290" class="lab">一级结构：sequence</text><path d="M650 150 C680 110, 740 110, 770 150 C800 190, 860 190, 890 150" fill="none" stroke="#ff9f7b" stroke-width="12" stroke-linecap="round"/><path d="M650 250 L890 250" stroke="#92d19b" stroke-width="12" stroke-linecap="round"/><text x="660" y="310" class="lab">二级结构：helix / sheet</text><path d="M170 470 C280 350, 420 570, 540 440 C620 360, 700 520, 760 450" fill="none" stroke="#c7a6ff" stroke-width="16" stroke-linecap="round"/><text x="260" y="590" class="lab">三级结构：整体折叠</text><circle cx="910" cy="470" r="70" fill="#d9ecff" stroke="#8cb8e8" stroke-width="3"/><circle cx="1015" cy="470" r="70" fill="#ffdccc" stroke="#e8a37c" stroke-width="3"/><text x="855" y="590" class="lab">四级结构：复合体</text></svg>