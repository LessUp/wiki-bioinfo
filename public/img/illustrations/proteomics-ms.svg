<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style>
  <text x="60" y="60" class="title">Mass spectrometry proteomics</text>
  <rect x="90" y="140" width="200" height="120" rx="18" fill="#d9ecff" stroke="#8cb8e8" stroke-width="2"/>
  <text x="154" y="190" class="lab">蛋白</text><text x="126" y="220" class="small">样本中的 protein pool</text>
  <rect x="340" y="140" width="200" height="120" rx="18" fill="#ffdccc" stroke="#e8a37c" stroke-width="2"/>
  <text x="403" y="190" class="lab">酶解</text><text x="385" y="220" class="small">trypsin → peptides</text>
  <rect x="590" y="140" width="220" height="120" rx="18" fill="#fff0bf" stroke="#e3c46d" stroke-width="2"/>
  <text x="645" y="190" class="lab">LC 分离</text><text x="635" y="220" class="small">按保留时间展开肽段</text>
  <rect x="860" y="140" width="250" height="120" rx="18" fill="#d9f0da" stroke="#90c890" stroke-width="2"/>
  <text x="930" y="190" class="lab">质谱检测</text><text x="912" y="220" class="small">MS1 / MS2 测 m/z 与强度</text>
  <path d="M290 200 H340" stroke="#4f8cc9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 200 H590" stroke="#4f8cc9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M810 200 H860" stroke="#4f8cc9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f8cc9"/></marker></defs>
  <rect x="140" y="380" width="900" height="170" rx="20" fill="white" stroke="#b8d7f0" stroke-width="2"/>
  <line x1="180" y1="510" x2="980" y2="510" stroke="#4a6988" stroke-width="3"/>
  <line x1="240" y1="510" x2="240" y2="425" stroke="#78aef5" stroke-width="8"/>
  <line x1="350" y1="510" x2="350" y2="400" stroke="#ff9f7b" stroke-width="8"/>
  <line x1="470" y1="510" x2="470" y2="450" stroke="#92d19b" stroke-width="8"/>
  <line x1="620" y1="510" x2="620" y2="370" stroke="#c7a6ff" stroke-width="8"/>
  <line x1="810" y1="510" x2="810" y2="430" stroke="#ffd06a" stroke-width="8"/>
  <text x="185" y="570" class="small">m/z</text><text x="970" y="570" class="small">→</text>
  <text x="695" y="350" class="lab">peaks = candidate ions</text>
</svg>