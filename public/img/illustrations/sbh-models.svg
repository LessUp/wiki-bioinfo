<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Left: SBH Principle -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">1. SBH 实验原理 (谱的获取)</text>
    <rect x="0" y="20" width="200" height="150" fill="#f0f0f0" stroke="#ccc" />
    <text x="100" y="45" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">DNA 芯片 (Probe Array)</text>
    
    <!-- Probes -->
    <rect x="20" y="60" width="30" height="30" fill="#4A90E2" stroke="#fff" />
    <rect x="60" y="60" width="30" height="30" fill="#4A90E2" stroke="#fff" />
    <rect x="100" y="60" width="30" height="30" fill="#BDC3C7" stroke="#fff" />
    <rect x="140" y="60" width="30" height="30" fill="#4A90E2" stroke="#fff" />
    
    <rect x="20" y="100" width="30" height="30" fill="#BDC3C7" stroke="#fff" />
    <rect x="60" y="100" width="30" height="30" fill="#4A90E2" stroke="#fff" />
    <rect x="100" y="100" width="30" height="30" fill="#4A90E2" stroke="#fff" />
    <rect x="140" y="100" width="30" height="30" fill="#BDC3C7" stroke="#fff" />
    
    <text x="100" y="190" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">荧光信号 = 包含该 l-mer</text>
  </g>

  <!-- Right: Two Graph Models -->
  <g transform="translate(400, 50)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">2. 两种建模方式对比</text>
    
    <!-- Model A: Hamiltonian -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="350" height="80" fill="#FFF4F4" stroke="#E74C3C" rx="5" />
      <text x="10" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#E74C3C">建模 A: Hamiltonian Path (顶点 = l-mer)</text>
      <text x="10" y="50" font-family="Arial" font-size="12" fill="#666">将每个片段设为节点，寻找遍历所有节点的路径</text>
      <text x="10" y="70" font-family="Arial" font-size="12" font-weight="bold" fill="#E74C3C">→ NP-Hard (计算极难)</text>
    </g>

    <!-- Model B: Eulerian -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="350" height="80" fill="#F4FFF4" stroke="#2ECC71" rx="5" />
      <text x="10" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#2ECC71">建模 B: Eulerian Path (边 = l-mer)</text>
      <text x="10" y="50" font-family="Arial" font-size="12" fill="#666">将(l-1)-mer设为节点，l-mer设为边，寻找遍历所有边的路径</text>
      <text x="10" y="70" font-family="Arial" font-size="12" font-weight="bold" fill="#2ECC71">→ P (线性时间可解!)</text>
    </g>
  </g>

  <!-- Arrow between left and right -->
  <path d="M 270 120 L 380 120" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="325" y="110" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">重构算法</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
