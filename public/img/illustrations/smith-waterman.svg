<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style>
  <text x="60" y="60" class="title">Smith–Waterman local alignment</text>
  <rect x="180" y="150" width="560" height="360" fill="white" stroke="#8cb8e8" stroke-width="3"/>
  <g stroke="#d8e6f5" stroke-width="2">
    <line x1="180" y1="210" x2="740" y2="210"/><line x1="180" y1="270" x2="740" y2="270"/><line x1="180" y1="330" x2="740" y2="330"/><line x1="180" y1="390" x2="740" y2="390"/><line x1="180" y1="450" x2="740" y2="450"/>
    <line x1="260" y1="150" x2="260" y2="510"/><line x1="340" y1="150" x2="340" y2="510"/><line x1="420" y1="150" x2="420" y2="510"/><line x1="500" y1="150" x2="500" y2="510"/><line x1="580" y1="150" x2="580" y2="510"/><line x1="660" y1="150" x2="660" y2="510"/>
  </g>
  <rect x="340" y="270" width="240" height="180" fill="#ffe8b0" stroke="#ffbf47" stroke-width="4"/>
  <path d="M360 430 L420 370 L500 370 L560 310" fill="none" stroke="#e06a6a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="820" y="210" class="lab">局部比对只保留</text>
  <text x="820" y="245" class="lab">得分最高的子路径</text>
  <text x="820" y="325" class="small">当得分跌到 0 时重新开始，</text>
  <text x="820" y="355" class="small">因此特别适合发现局部高相似片段。</text>
  <text x="215" y="140" class="small">ε</text><text x="290" y="140" class="small">A</text><text x="370" y="140" class="small">C</text><text x="450" y="140" class="small">G</text><text x="530" y="140" class="small">T</text><text x="610" y="140" class="small">A</text>
  <text x="150" y="190" class="small">ε</text><text x="150" y="250" class="small">A</text><text x="150" y="310" class="small">G</text><text x="150" y="370" class="small">T</text><text x="150" y="430" class="small">A</text>
  <text x="60" y="650" class="small">与全局比对不同，Smith–Waterman 允许从任意位置开始和结束，因此特别适合 motif、domain 或局部相似区域搜索。</text>
</svg>