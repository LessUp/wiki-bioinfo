<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" fill="#fbfcff"/><style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 21px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}.box{fill:white;stroke:#b8d7f0;stroke-width:2;rx:18}.arrow{stroke:#4f8cc9;stroke-width:4;fill:none;marker-end:url(#arrow)}</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f8cc9"/></marker></defs><text x="60" y="60" class="title">AlphaFold-style structure prediction pipeline</text><rect x="70" y="150" width="180" height="110" class="box"/><text x="118" y="193" class="lab">序列</text><text x="105" y="223" class="small">protein sequence input</text><rect x="300" y="150" width="190" height="110" class="box"/><text x="362" y="193" class="lab">MSA</text><text x="336" y="223" class="small">同源序列与进化信息</text><rect x="540" y="150" width="210" height="110" class="box"/><text x="586" y="193" class="lab">几何关系</text><text x="570" y="223" class="small">残基间距离 / 接触</text><rect x="800" y="150" width="210" height="110" class="box"/><text x="855" y="193" class="lab">3D 模型</text><text x="846" y="223" class="small">原子坐标输出</text><path d="M250 205 H300" class="arrow"/><path d="M490 205 H540" class="arrow"/><path d="M750 205 H800" class="arrow"/><rect x="280" y="380" width="260" height="140" class="box"/><text x="334" y="430" class="lab">pLDDT</text><text x="316" y="462" class="small">局部置信度，判断区域是否可靠</text><rect x="650" y="380" width="260" height="140" class="box"/><text x="726" y="430" class="lab">PAE</text><text x="686" y="462" class="small">domain 间相对位置是否可信</text><path d="M905 260 V340" class="arrow"/></svg>