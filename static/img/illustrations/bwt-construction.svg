<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style>
  <text x="60" y="60" class="title">BWT construction</text>
  <text x="120" y="140" class="lab">原始字符串：BANANA$</text>
  <rect x="110" y="190" width="420" height="360" rx="18" fill="white" stroke="#8cb8e8" stroke-width="3"/>
  <text x="140" y="235" class="small">$BANANA</text>
  <text x="140" y="275" class="small">A$BANAN</text>
  <text x="140" y="315" class="small">ANA$BAN</text>
  <text x="140" y="355" class="small">ANANA$B</text>
  <text x="140" y="395" class="small">BANANA$</text>
  <text x="140" y="435" class="small">NA$BANA</text>
  <text x="140" y="475" class="small">NANA$BA</text>
  <text x="610" y="140" class="lab">排序后的循环位移</text>
  <rect x="600" y="190" width="500" height="360" rx="18" fill="white" stroke="#8cb8e8" stroke-width="3"/>
  <text x="630" y="235" class="small">$BANANA</text>
  <text x="630" y="275" class="small">A$BANAN</text>
  <text x="630" y="315" class="small">ANA$BAN</text>
  <text x="630" y="355" class="small">ANANA$B</text>
  <text x="630" y="395" class="small">BANANA$</text>
  <text x="630" y="435" class="small">NA$BANA</text>
  <text x="630" y="475" class="small">NANA$BA</text>
  <rect x="985" y="205" width="75" height="320" fill="#ffe8b0" stroke="#ffbf47" stroke-width="3"/>
  <text x="1005" y="180" class="lab">Last</text>
  <text x="1012" y="235" class="small">A</text><text x="1012" y="275" class="small">N</text><text x="1012" y="315" class="small">N</text><text x="1012" y="355" class="small">B</text><text x="1012" y="395" class="small">$</text><text x="1012" y="435" class="small">A</text><text x="1012" y="475" class="small">A</text>
  <text x="830" y="595" class="small">BWT = ANNB$AA</text>
  <text x="60" y="650" class="small">Burrows–Wheeler Transform 通过排序所有循环位移，把相同上下文聚到一起，为后续 FM-index 压缩与快速匹配提供基础。</text>
</svg>