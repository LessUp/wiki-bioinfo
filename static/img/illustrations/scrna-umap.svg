  <text x="260" y="628" class="small">UMAP1</text>
  <g transform="translate(92,560) rotate(-90)"><text class="small">UMAP2</text></g>
  <text x="58" y="670" class="small">UMAP 只保留局部邻域结构：它非常适合展示 cluster，但坐标轴本身通常没有直接生物学意义。</text>
