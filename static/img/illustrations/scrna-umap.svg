  <circle cx="210" cy="240" r="7" fill="#2a5f9e"/><circle cx="235" cy="280" r="7" fill="#2a5f9e"/><circle cx="280" cy="250" r="7" fill="#2a5f9e"/><circle cx="265" cy="215" r="7" fill="#2a5f9e"/>
  <circle cx="450" cy="170" r="7" fill="#b64f5e"/><circle cx="510" cy="180" r="7" fill="#b64f5e"/><circle cx="480" cy="145" r="7" fill="#b64f5e"/><circle cx="495" cy="215" r="7" fill="#b64f5e"/>
