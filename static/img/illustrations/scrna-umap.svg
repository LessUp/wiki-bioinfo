  <circle cx="760" cy="240" r="7" fill="#347647"/><circle cx="825" cy="255" r="7" fill="#347647"/><circle cx="790" cy="205" r="7" fill="#347647"/><circle cx="860" cy="280" r="7" fill="#347647"/>
