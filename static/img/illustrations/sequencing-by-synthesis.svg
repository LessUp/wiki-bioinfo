<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}</style>
  <text x="60" y="60" class="title">Sequencing by synthesis</text>
  <rect x="120" y="180" width="960" height="90" rx="18" fill="#d7e9ff" stroke="#8cb8e8" stroke-width="2"/>
  <circle cx="220" cy="225" r="22" fill="#76b5ff"/><circle cx="340" cy="225" r="22" fill="#ffb26b"/><circle cx="460" cy="225" r="22" fill="#8fd3a8"/><circle cx="580" cy="225" r="22" fill="#d2a3ff"/><circle cx="700" cy="225" r="22" fill="#76b5ff"/><circle cx="820" cy="225" r="22" fill="#ffb26b"/><circle cx="940" cy="225" r="22" fill="#8fd3a8"/>
  <text x="172" y="365" class="lab">1. 加入可逆终止荧光核苷酸</text>
  <text x="172" y="405" class="small">每一轮只能掺入一个碱基，并拍照记录颜色</text>
  <text x="172" y="490" class="lab">2. 去除阻断基团，进入下一轮循环</text>
  <text x="172" y="530" class="small">不断重复，逐轮读出模板序列</text>
  <path d="M170 250 C240 310, 360 310, 430 250" fill="none" stroke="#4f8cc9" stroke-width="5"/>
  <path d="M530 250 C600 310, 720 310, 790 250" fill="none" stroke="#4f8cc9" stroke-width="5"/>
  <path d="M890 250 C960 310, 1030 310, 1070 250" fill="none" stroke="#4f8cc9" stroke-width="5"/>
  <text x="60" y="650" class="small">Illumina 的 sequencing-by-synthesis 用逐轮成像把 DNA 合成过程转成颜色序列，是短读长高通量测序的核心原理。</text>
</svg>