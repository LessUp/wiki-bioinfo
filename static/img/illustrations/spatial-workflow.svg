<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 22px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}.box{fill:white;stroke:#b8d7f0;stroke-width:2;rx:18}.arrow{stroke:#4f8cc9;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f8cc9"/></marker></defs>
  <text x="60" y="60" class="title">Spatial transcriptomics workflow</text>
  <rect x="70" y="120" width="190" height="110" class="box"/><text x="118" y="165" class="lab">组织切片</text><text x="108" y="195" class="small">保留原始空间结构</text>
  <rect x="305" y="120" width="190" height="110" class="box"/><text x="346" y="165" class="lab">染色成像</text><text x="328" y="195" class="small">H&amp;E / IF 获取组织图像</text>
  <rect x="540" y="120" width="190" height="110" class="box"/><text x="578" y="165" class="lab">spot 捕获</text><text x="564" y="195" class="small">空间条码捕获 RNA</text>
  <rect x="775" y="120" width="190" height="110" class="box"/><text x="840" y="165" class="lab">测序</text><text x="816" y="195" class="small">读取 UMI 与空间条码</text>
  <rect x="1010" y="120" width="140" height="110" class="box"/><text x="1037" y="165" class="lab">矩阵</text><text x="1022" y="195" class="small">gene × spot</text>
  <path d="M260 175 H305" class="arrow"/><path d="M495 175 H540" class="arrow"/><path d="M730 175 H775" class="arrow"/><path d="M965 175 H1010" class="arrow"/>
  <rect x="160" y="360" width="250" height="130" class="box"/><text x="226" y="407" class="lab">空间坐标</text><text x="192" y="438" class="small">每个 spot 绑定二维位置</text>
  <rect x="475" y="360" width="250" height="130" class="box"/><text x="540" y="407" class="lab">聚类与SVG</text><text x="500" y="438" class="small">空间可变基因与邻域分析</text>
  <rect x="790" y="360" width="250" height="130" class="box"/><text x="862" y="407" class="lab">去卷积</text><text x="834" y="438" class="small">结合 scRNA-seq 做细胞映射</text>
  <path d="M1080 230 V325" class="arrow"/><path d="M410 425 H475" class="arrow"/><path d="M725 425 H790" class="arrow"/>
  <rect x="120" y="550" width="180" height="70" rx="18" fill="#d9ecff"/><rect x="310" y="550" width="180" height="70" rx="18" fill="#ffd8d8"/><rect x="500" y="550" width="180" height="70" rx="18" fill="#ffe5b2"/><rect x="690" y="550" width="180" height="70" rx="18" fill="#d8f1d8"/><rect x="880" y="550" width="180" height="70" rx="18" fill="#e4d9ff"/>
  <text x="148" y="593" class="small">Tumor core</text><text x="336" y="593" class="small">Boundary</text><text x="545" y="593" class="small">Stroma</text><text x="744" y="593" class="small">Immune niche</text><text x="940" y="593" class="small">Necrosis</text>
</svg>