<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#fbfcff"/>
  <style>.title{font:700 34px sans-serif;fill:#183153}.lab{font:600 21px sans-serif;fill:#183153}.small{font:500 16px sans-serif;fill:#456}.box{fill:white;stroke:#b8d7f0;stroke-width:2;rx:16}.arrow{stroke:#4f8cc9;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f8cc9"/></marker></defs>
  <text x="60" y="60" class="title">Clinical variant prioritization</text>
  <rect x="70" y="150" width="170" height="100" class="box"/><text x="115" y="193" class="lab">VCF 列表</text><text x="100" y="223" class="small">原始候选变异集合</text>
  <rect x="280" y="150" width="190" height="100" class="box"/><text x="323" y="193" class="lab">群体频率</text><text x="309" y="223" class="small">去除常见变异</text>
  <rect x="510" y="150" width="190" height="100" class="box"/><text x="545" y="193" class="lab">功能影响</text><text x="532" y="223" class="small">LoF / splice / missense</text>
  <rect x="740" y="150" width="190" height="100" class="box"/><text x="785" y="193" class="lab">表型匹配</text><text x="772" y="223" class="small">gene-disease relevance</text>
  <rect x="970" y="150" width="160" height="100" class="box"/><text x="1003" y="193" class="lab">排序</text><text x="991" y="223" class="small">候选收敛</text>
  <path d="M240 200 H280" class="arrow"/><path d="M470 200 H510" class="arrow"/><path d="M700 200 H740" class="arrow"/><path d="M930 200 H970" class="arrow"/>
  <rect x="180" y="360" width="250" height="140" class="box"/><text x="235" y="405" class="lab">家系 / 遗传模式</text><text x="228" y="438" class="small">de novo / AR / AD / X-linked</text>
  <rect x="480" y="360" width="250" height="140" class="box"/><text x="565" y="405" class="lab">ClinVar</text><text x="528" y="438" class="small">文献、数据库与功能证据</text>
  <rect x="780" y="360" width="250" height="140" class="box"/><text x="866" y="405" class="lab">ACMG</text><text x="832" y="438" class="small">整合后给出临床分类</text>
  <path d="M430 430 H480" class="arrow"/><path d="M730 430 H780" class="arrow"/>
  <text x="60" y="640" class="small">临床解释的关键不在“看单个分数”，而在于把频率、功能、表型、遗传模式和文献证据连成一条可追溯的证据链。</text>
</svg>